<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 120" role="img" aria-labelledby="title desc">
  <title id="title">TMS wordmark</title>
  <desc id="desc">The Minerals, Metals and Materials Society wordmark-style mark for portfolio affiliation display.</desc>
  <rect width="420" height="120" rx="14" fill="#ffffff"/>
  <text x="32" y="72" fill="#1c4f8f" font-family="Arial, Helvetica, sans-serif" font-size="52" font-weight="900" letter-spacing="2">TMS</text>
  <path d="M158 34h226" stroke="#d45b2a" stroke-width="5" stroke-linecap="round"/>
  <text x="158" y="65" fill="#263238" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="800">The Minerals, Metals</text>
  <text x="158" y="89" fill="#263238" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="800">&amp; Materials Society</text>
</svg>
